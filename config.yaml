mastra-agent-extension:
  maxCards: 4
  maxLines: 60
  listMaxLines: 18
  listMaxAgents: 5
  reservedRows: 10
  defaultViewMode: list
  viewModeShortcut: alt+h
  nextAgentShortcut: alt+o
  previousAgentShortcut: alt+i
  detailScrollDownShortcut: alt+j
  detailScrollUpShortcut: alt+k
  detailStreamOnlyShortcut: alt+s
  colors:
    prompt: syntaxString
    toolName: text
    toolQuery: syntaxString
    toolOutput: muted
    reasoning: muted
  debug: true
  debugPiRedraw: true
